services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask_backend
    ports:
      - "5000:5000"
    networks:
      - flaskp_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: node_frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - flaskp_network

networks:
  flaskp_network:
    driver: bridge
